# =============================================================================
# Lumeo — CI Pipeline (lint, typecheck, test)
# =============================================================================
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ---- Frontend checks ----
  front-lint:
    name: "Front — Lint & Typecheck"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  # ---- Backend checks ----
  back-test:
    name: "Back — PHPUnit"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lumeo_test
          POSTGRES_USER: lumeo
          POSTGRES_PASSWORD: lumeo
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U lumeo"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: intl, pdo_pgsql, zip
          coverage: none

      - name: Get Composer cache dir
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ hashFiles('back/composer.lock') }}
          restore-keys: composer-

      - name: Create .env for Symfony
        run: |
          echo "APP_ENV=test" > .env
          echo "APP_SECRET=ci-secret-not-real" >> .env
          echo "DATABASE_URL=postgresql://lumeo:lumeo@localhost:5432/lumeo_test?serverVersion=16" >> .env

      - run: composer install --no-interaction --prefer-dist

      - name: Run migrations
        run: php bin/console doctrine:migrations:migrate --no-interaction --env=test
        env:
          DATABASE_URL: postgresql://lumeo:lumeo@localhost:5432/lumeo_test?serverVersion=16

      - name: Run PHPUnit
        run: php bin/phpunit
        env:
          DATABASE_URL: postgresql://lumeo:lumeo@localhost:5432/lumeo_test?serverVersion=16
          APP_ENV: test

  # ---- Docker build smoke test ----
  docker-build:
    name: "Docker — Build images"
    runs-on: ubuntu-latest
    needs: [front-lint, back-test]
    steps:
      - uses: actions/checkout@v4

      - name: Build back-php image
        run: docker build -f docker/back/Dockerfile --target php -t lumeo/back-php:ci .

      - name: Build back-nginx image
        run: docker build -f docker/back/Dockerfile --target nginx -t lumeo/back-nginx:ci .

      - name: Build front image
        run: docker build -f docker/front/Dockerfile -t lumeo/front:ci .

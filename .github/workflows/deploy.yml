# =============================================================================
# Lumeo — CD Pipeline (build, push to GHCR, deploy to VPS via SSH)
# =============================================================================
name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: "Build & Push Docker images"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image tag and prefix
        id: tag
        run: |
          echo "tag=$(echo $GITHUB_SHA | head -c 7)" >> $GITHUB_OUTPUT
          echo "image_prefix=$(echo '${{ github.repository_owner }}/lumeo' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      # ---- Back PHP-FPM ----
      - name: Build & push back-php
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/back/Dockerfile
          target: php
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.tag.outputs.image_prefix }}/back-php:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.tag.outputs.image_prefix }}/back-php:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- Back Nginx ----
      - name: Build & push back-nginx
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/back/Dockerfile
          target: nginx
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.tag.outputs.image_prefix }}/back-nginx:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.tag.outputs.image_prefix }}/back-nginx:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- Front ----
      - name: Build & push front
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/front/Dockerfile
          push: true
          build-args: |
            NUXT_PUBLIC_API_BASE=${{ secrets.NUXT_PUBLIC_API_BASE }}
            NUXT_PUBLIC_MERCURE_HUB=${{ secrets.NUXT_PUBLIC_MERCURE_HUB }}
            NUXT_PUBLIC_SERVER_BASE=${{ secrets.NUXT_PUBLIC_SERVER_BASE }}
            NUXT_PUBLIC_STRIPE_PUBLIC_KEY=${{ secrets.STRIPE_PUBLIC_KEY }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.tag.outputs.image_prefix }}/front:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.tag.outputs.image_prefix }}/front:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
      image_prefix: ${{ steps.tag.outputs.image_prefix }}

  deploy:
    name: "Deploy to VPS"
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose & config to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.prod.yml,docker/back/nginx.conf,docker/caddy/lumeo.caddyfile"
          target: /var/www/lumeo

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: IMAGE_TAG
          script: |
            cd /var/www/lumeo

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Export env for compose
            export IMAGE_TAG=${IMAGE_TAG}
            export DOCKER_REGISTRY=${{ env.REGISTRY }}
            export DOCKER_IMAGE_PREFIX=${{ needs.build-and-push.outputs.image_prefix }}

            # Pull latest images
            docker compose -f docker-compose.prod.yml pull

            # Deploy
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Run migrations
            docker compose -f docker-compose.prod.yml exec -T back-php php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration

            # Update Caddy config if changed
            if [ -f docker/caddy/lumeo.caddyfile ]; then
              sudo cp docker/caddy/lumeo.caddyfile /etc/caddy/conf.d/lumeo.caddyfile 2>/dev/null || true
              sudo systemctl reload caddy 2>/dev/null || true
            fi

            # Cleanup old images
            docker image prune -f

            echo "✅ Deployed $IMAGE_TAG successfully"

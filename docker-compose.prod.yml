# =============================================================================
# Lumeo — Production (docker compose -f docker-compose.prod.yml up -d)
# Caddy on host handles TLS & reverse proxy → services on 127.0.0.1:116xx
# =============================================================================

services:
  # ---- PostgreSQL ----
  database:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ---- Mercure Hub ----
  mercure:
    image: dunglas/mercure
    restart: always
    environment:
      SERVER_NAME: ':80'
      MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_JWT_SECRET}
      MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_JWT_SECRET}
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins ${FRONT_BASE_URL}
        anonymous
    ports:
      - "127.0.0.1:11602:80"
    volumes:
      - mercure_data:/data
      - mercure_config:/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ---- Backend PHP-FPM ----
  back-php:
    image: ${DOCKER_REGISTRY:-ghcr.io}/${DOCKER_IMAGE_PREFIX:-lumeo}/back-php:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/back/Dockerfile
      target: php
    restart: always
    depends_on:
      database:
        condition: service_healthy
    environment:
      APP_ENV: prod
      APP_DEBUG: 0
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}?serverVersion=16&charset=utf8
      MERCURE_URL: http://mercure/.well-known/mercure
      MERCURE_PUBLIC_URL: https://lumeo.jeremyduc.dev/.well-known/mercure
      MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET}
      JWT_SECRET_KEY: '%kernel.project_dir%/config/jwt/private.pem'
      JWT_PUBLIC_KEY: '%kernel.project_dir%/config/jwt/public.pem'
      JWT_PASSPHRASE: ${JWT_PASSPHRASE}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      FRONT_BASE_URL: ${FRONT_BASE_URL}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN}
    volumes:
      - back_uploads:/var/www/public/images
      - back_jwt:/var/www/config/jwt
    networks:
      - internal

  # ---- Backend Nginx (PHP-FPM sidecar) ----
  back-nginx:
    image: ${DOCKER_REGISTRY:-ghcr.io}/${DOCKER_IMAGE_PREFIX:-lumeo}/back-nginx:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/back/Dockerfile
      target: nginx
    restart: always
    depends_on:
      - back-php
    ports:
      - "127.0.0.1:11601:80"
    volumes:
      - back_uploads:/var/www/public/images:ro
    networks:
      - internal

  # ---- Frontend Nuxt SSR ----
  front:
    image: ${DOCKER_REGISTRY:-ghcr.io}/${DOCKER_IMAGE_PREFIX:-lumeo}/front:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/front/Dockerfile
      args:
        NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE}
        NUXT_PUBLIC_MERCURE_HUB: ${NUXT_PUBLIC_MERCURE_HUB}
        NUXT_PUBLIC_SERVER_BASE: ${NUXT_PUBLIC_SERVER_BASE}
        NUXT_PUBLIC_STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY}
    restart: always
    ports:
      - "127.0.0.1:11600:3000"
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE}
      NUXT_PUBLIC_MERCURE_HUB: ${NUXT_PUBLIC_MERCURE_HUB}
      NUXT_PUBLIC_SERVER_BASE: ${NUXT_PUBLIC_SERVER_BASE}
      NUXT_PUBLIC_STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY}
    networks:
      - internal

volumes:
  db_data:
  mercure_data:
  mercure_config:
  back_uploads:
  back_jwt:

networks:
  internal:
    driver: bridge
